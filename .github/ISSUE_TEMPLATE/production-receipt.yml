name: Production receipt
description: You traded real money through pmq: post the receipt. Receipts for signature_type 1 or 2 are the most wanted (never carried real funds through this library yet).
title: "Production receipt: "
labels: [receipt]
body:
  - type: dropdown
    id: sigtype
    attributes:
      label: signature_type
      options: ["0 (EOA)", "1 (POLY_PROXY / Magic)", "2 (POLY_GNOSIS_SAFE)", "3 (POLY_1271 deposit wallet)"]
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: pmquant version
      placeholder: "0.4.8"
    validations:
      required: true
  - type: input
    id: tx
    attributes:
      label: Settlement transaction hash (polygonscan)
      description: The on-chain settlement of a fill placed through pmq. This is the receipt.
      placeholder: "0x..."
    validations:
      required: true
  - type: dropdown
    id: path
    attributes:
      label: Order path
      options: ["buy_fak", "sell_fak", "limit_gtc (maker)", "MCP fak_buy/fak_sell"]
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Anything that surprised you
      description: Error messages, latency, book behavior; the surprising parts become docs.
